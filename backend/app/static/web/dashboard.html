<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JobScout — Dashboard</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="header">
  <div class="header-left">
    <div class="logo-badge">JS</div>
    <span class="header-title">JobScout</span>
  </div>
  <div class="header-right">
    <span class="user-email" id="user-email"></span>
    <a href="settings.html" class="btn-secondary">Settings</a>
    <button class="btn-secondary" id="btn-logout">Sign Out</button>
  </div>
</div>

<div id="no-key-banner" class="api-key-banner hidden">
  ⚠ No API key configured — job analysis is disabled.
  <a href="settings.html">Add your API key →</a>
</div>

<div class="stats-bar" id="stats-bar">
  <div class="stat-item active" data-filter="all">
    <span class="stat-value" id="stat-total">0</span>
    <span class="stat-label">Total</span>
  </div>
  <div class="stat-item" data-filter="applied">
    <span class="stat-value" id="stat-applied">0</span>
    <span class="stat-label">Applied</span>
  </div>
  <div class="stat-item" data-filter="phone_screen">
    <span class="stat-value" id="stat-phone_screen">0</span>
    <span class="stat-label">Phone Screen</span>
  </div>
  <div class="stat-item" data-filter="interviewed">
    <span class="stat-value" id="stat-interviewed">0</span>
    <span class="stat-label">Interviewed</span>
  </div>
  <div class="stat-item" data-filter="offer">
    <span class="stat-value" id="stat-offer">0</span>
    <span class="stat-label">Offer</span>
  </div>
  <div class="stat-item" data-filter="rejected">
    <span class="stat-value" id="stat-rejected">0</span>
    <span class="stat-label">Rejected</span>
  </div>
</div>

<div class="controls-bar">
  <input type="text" id="search" placeholder="Search by title or company…">
  <select id="sort-col">
    <option value="score">Sort by Score</option>
    <option value="date">Sort by Date</option>
    <option value="status">Sort by Status</option>
    <option value="title">Sort by Title</option>
  </select>
  <button class="btn-secondary" id="btn-sort-dir" title="Toggle sort direction">↓</button>
</div>

<div class="content">
  <table class="job-table" id="job-table">
    <thead>
      <tr>
        <th>Score</th>
        <th>Title / Company</th>
        <th>Salary Est.</th>
        <th>Status</th>
        <th>Analyzed</th>
        <th>Rec.</th>
      </tr>
    </thead>
    <tbody id="job-tbody"></tbody>
  </table>
  <div id="empty-state" class="empty-state hidden">
    <h3>No jobs yet</h3>
    <p>Analyze jobs with the browser extension to see them here.</p>
  </div>
</div>

<script src="dashboard.js"></script>
</body>
</html>
