<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JobScout — Sign In</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="logo-badge">JS</div>
      <h1>JobScout</h1>
    </div>

    <!-- Login form -->
    <div id="login-section">
      <p class="auth-subtitle">Sign in to view your job dashboard</p>
      <div id="login-error" class="error-msg hidden"></div>
      <form id="login-form">
        <div class="field"><label>Email</label><input type="email" id="login-email" required autocomplete="email"></div>
        <div class="field"><label>Password</label><input type="password" id="login-password" required autocomplete="current-password"></div>
        <button type="submit" class="btn-primary" id="btn-login">Sign In</button>
      </form>
      <div class="toggle-link">No account? <a id="show-register">Create one</a></div>
    </div>

    <!-- Register form -->
    <div id="register-section" class="hidden">
      <p class="auth-subtitle">Create your JobScout account</p>
      <div id="register-error" class="error-msg hidden"></div>
      <form id="register-form">
        <div class="field"><label>Email</label><input type="email" id="reg-email" required autocomplete="email"></div>
        <div class="field"><label>Password <span style="font-weight:400;text-transform:none">(min 8 chars)</span></label><input type="password" id="reg-password" required minlength="8" autocomplete="new-password"></div>
        <button type="submit" class="btn-primary" id="btn-register">Create Account</button>
      </form>
      <div class="toggle-link">Already have an account? <a id="show-login">Sign in</a></div>
    </div>
  </div>
</div>
<script src="login.js"></script>
</body>
</html>
