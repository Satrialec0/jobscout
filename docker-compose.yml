services:
  backend:
    build: ./backend
    container_name: jobscout_backend
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    volumes:
      - ./backend:/app
    working_dir: /app
    env_file:
      - ./backend/.env
    depends_on:
      - db

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: jobscout_tunnel
    command: tunnel --no-autoupdate run --token eyJhIjoiYzMyNTMwMDhmNDc5NmViMzkxMGM1OTgxMmE0MzU1ODAiLCJ0IjoiYTNhYWQ5NmMtZmMxOS00Y2QzLTg4MjEtMTZmZDNjYTUwZDMzIiwicyI6Ik56azRNMlU0TWpVdFl6RTBaQzAwTWpsakxXRmpOall0WkRBM09EWmpZVFJqTldNeiJ9
    depends_on:
      - backend

  db:
    image: postgres:16
    container_name: jobscout_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: jobscout
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
