<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JobScout — Application Assistant</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        min-height: 100vh;
        font-size: 13px;
      }

      /* ── Header ── */
      .header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 14px;
        border-bottom: 1px solid #1e293b;
        background: #0f172a;
        position: sticky;
        top: 0;
        z-index: 10;
      }

      .header-logo {
        width: 20px; height: 20px;
        background: #38bdf8;
        border-radius: 4px;
        display: flex; align-items: center; justify-content: center;
        font-size: 10px; font-weight: 700; color: #0f172a;
        flex-shrink: 0;
      }

      .header-title {
        font-size: 13px; font-weight: 600; color: #f1f5f9;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        flex: 1; min-width: 0;
      }

      .header-company {
        font-size: 11px; color: #64748b;
        white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        max-width: 140px; flex-shrink: 0;
      }

      .score-badge {
        display: inline-flex; align-items: center; justify-content: center;
        width: 30px; height: 30px;
        border-radius: 6px;
        font-size: 12px; font-weight: 700;
        flex-shrink: 0;
      }

      /* ── Content ── */
      .content {
        padding: 12px;
        display: flex; flex-direction: column; gap: 12px;
      }

      /* ── Context strip ── */
      #context-strip {
        background: #111827;
        border: 1px solid #1e293b;
        border-radius: 8px;
        padding: 10px 12px;
        font-size: 12px;
      }

      .context-matches {
        display: flex; flex-wrap: wrap; gap: 4px;
        margin-top: 6px;
      }

      .match-pill {
        background: #052e16; color: #4ade80;
        border: 1px solid #166534;
        border-radius: 4px; padding: 1px 7px;
        font-size: 11px;
      }

      .context-meta {
        font-size: 11px; color: #475569; margin-top: 6px;
        cursor: pointer; user-select: none;
      }
      .context-meta:hover { color: #64748b; }

      .btn-mark-applied {
        background: #0c1a3a; border: 1px solid #1e3a5f; color: #38bdf8;
        border-radius: 4px; padding: 3px 8px;
        font-size: 11px; font-weight: 600; cursor: pointer;
        white-space: nowrap; flex-shrink: 0;
        transition: opacity 0.15s;
      }
      .btn-mark-applied:hover { opacity: 0.85; }
      .btn-mark-applied.done {
        background: #052e16; border-color: #166534; color: #4ade80; cursor: default;
      }

      /* ── Job picker ── */
      #job-picker {
        display: none;
        background: #111827;
        border: 1px solid #1e293b;
        border-radius: 8px;
        overflow: hidden;
        max-height: 280px;
        overflow-y: auto;
      }

      #job-picker::-webkit-scrollbar { width: 4px; }
      #job-picker::-webkit-scrollbar-track { background: transparent; }
      #job-picker::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 2px; }
      #job-picker::-webkit-scrollbar-thumb:hover { background: #334155; }

      .picker-item {
        padding: 8px 12px;
        cursor: pointer;
        border-bottom: 1px solid #1e293b;
        transition: background 0.1s;
      }
      .picker-item:last-child { border-bottom: none; }
      .picker-item:hover { background: #1e293b; }
      .picker-item-title { font-size: 12px; font-weight: 600; color: #e2e8f0; }
      .picker-item-company { font-size: 11px; color: #64748b; }

      /* ── Salary section ── */
      .salary-header {
        display: flex; align-items: baseline; gap: 6px; flex-wrap: wrap;
        margin-bottom: 10px;
      }
      .salary-source {
        font-size: 11px; color: #475569;
      }
      .salary-range-text {
        font-size: 13px; font-weight: 600; color: #e2e8f0;
      }
      .salary-confidence {
        font-size: 10px; color: #475569; margin-left: auto;
      }
      .salary-listed-row {
        font-size: 11px; color: #94a3b8; margin-bottom: 8px;
      }
      .salary-slider-row {
        display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
      }
      .salary-bound {
        font-size: 10px; color: #475569; white-space: nowrap;
        flex-shrink: 0; min-width: 28px;
      }
      .salary-bound:last-child { text-align: right; }
      .salary-slider {
        flex: 1; -webkit-appearance: none; appearance: none;
        height: 4px; border-radius: 2px;
        background: linear-gradient(to right, #38bdf8 var(--pct, 50%), #1e293b var(--pct, 50%));
        outline: none; cursor: pointer; border: none;
      }
      .salary-slider::-webkit-slider-thumb {
        -webkit-appearance: none; width: 14px; height: 14px;
        border-radius: 50%; background: #38bdf8; cursor: pointer;
        border: 2px solid #0f172a; box-shadow: 0 0 0 2px #0f172a;
      }
      .salary-slider::-moz-range-thumb {
        width: 14px; height: 14px; border-radius: 50%;
        background: #38bdf8; cursor: pointer;
        border: 2px solid #0f172a;
      }
      .salary-ask-row {
        display: flex; align-items: center; gap: 8px;
        font-size: 12px; color: #64748b;
      }
      .salary-ask-row strong {
        color: #38bdf8; font-size: 15px; font-weight: 700;
      }
      .salary-percentile {
        font-size: 10px; color: #334155; margin-left: auto;
      }

      /* ── Instructions block ── */
      .section-card {
        background: #111827;
        border: 1px solid #1e293b;
        border-radius: 8px;
        overflow: hidden;
      }

      .section-header {
        display: flex; align-items: center; justify-content: space-between;
        padding: 8px 12px;
        cursor: pointer; user-select: none;
        border-bottom: 1px solid transparent;
        transition: background 0.1s;
      }
      .section-header:hover { background: #1a2540; }
      .section-header.open { border-bottom-color: #1e293b; }

      .section-title {
        font-size: 11px; font-weight: 600; color: #94a3b8;
        text-transform: uppercase; letter-spacing: 0.05em;
        display: flex; align-items: center; gap: 6px;
      }

      .section-chevron { font-size: 9px; color: #475569; transition: transform 0.2s; }
      .section-chevron.open { transform: rotate(180deg); }

      .section-body { padding: 10px 12px; display: none; }
      .section-body.open { display: block; }

      /* ── Textarea ── */
      textarea {
        width: 100%;
        background: #0f172a; border: 1px solid #1e293b;
        border-radius: 5px; color: #e2e8f0;
        font-family: inherit; font-size: 12px; line-height: 1.6;
        padding: 8px 10px; resize: vertical; min-height: 64px;
        transition: border-color 0.15s;
      }
      textarea:focus { outline: none; border-color: #38bdf8; }
      textarea::placeholder { color: #334155; }

      /* ── Q&A ── */
      .qa-list { display: flex; flex-direction: column; gap: 10px; }

      .qa-block {
        background: #0f172a; border: 1px solid #1e293b;
        border-radius: 6px; padding: 10px;
        display: flex; flex-direction: column; gap: 6px;
      }

      .qa-block-header {
        display: flex; align-items: flex-start; gap: 6px;
      }

      .qa-question-input {
        flex: 1;
        background: #111827; border: 1px solid #1e293b;
        border-radius: 4px; color: #e2e8f0;
        font-family: inherit; font-size: 12px;
        padding: 6px 8px; resize: none; min-height: 34px;
        transition: border-color 0.15s;
      }
      .qa-question-input:focus { outline: none; border-color: #38bdf8; }
      .qa-question-input::placeholder { color: #334155; }

      .qa-actions { display: flex; gap: 4px; align-items: center; flex-shrink: 0; }

      .btn-generate-answer {
        background: #0c2240; border: 1px solid #1e4d8c; color: #38bdf8;
        border-radius: 4px; padding: 4px 8px;
        font-size: 11px; font-weight: 600; cursor: pointer;
        white-space: nowrap; transition: opacity 0.15s;
      }
      .btn-generate-answer:hover { opacity: 0.85; }
      .btn-generate-answer:disabled { opacity: 0.5; cursor: not-allowed; }

      .btn-remove-qa {
        background: none; border: none; color: #475569;
        font-size: 13px; cursor: pointer; padding: 4px 3px;
        line-height: 1; transition: color 0.15s; flex-shrink: 0;
      }
      .btn-remove-qa:hover { color: #f87171; }

      .qa-answer-wrap { display: flex; flex-direction: column; gap: 3px; }

      .qa-answer-label {
        font-size: 10px; font-weight: 600; color: #334155;
        text-transform: uppercase; letter-spacing: 0.06em;
        display: flex; align-items: center; gap: 6px;
      }

      .btn-copy {
        background: #1e293b; border: 1px solid #334155; color: #94a3b8;
        border-radius: 4px; padding: 2px 7px;
        font-size: 10px; font-weight: 600; cursor: pointer;
        transition: opacity 0.15s;
      }
      .btn-copy:hover { opacity: 0.8; }
      .btn-copy.copied { background: #052e16; color: #4ade80; border-color: #166534; }

      .qa-empty-state {
        font-size: 12px; color: #334155; font-style: italic; padding: 4px 0;
      }

      .btn-add-question {
        background: #1e293b; border: 1px dashed #334155;
        border-radius: 6px; color: #475569;
        font-size: 11px; font-weight: 500; padding: 5px 10px;
        cursor: pointer; width: 100%; text-align: left;
        transition: border-color 0.15s, color 0.15s;
        margin-top: 8px;
      }
      .btn-add-question:hover { border-color: #475569; color: #94a3b8; }

      /* ── States ── */
      .loading-msg {
        font-size: 12px; color: #475569; padding: 20px; text-align: center;
      }

      .error-msg {
        font-size: 12px; color: #f87171;
        padding: 8px 10px; background: #2d1515;
        border: 1px solid #7f1d1d; border-radius: 6px;
      }

      .spinner {
        display: inline-block; width: 10px; height: 10px;
        border: 2px solid #1e293b; border-top-color: #38bdf8;
        border-radius: 50%; animation: spin 0.7s linear infinite;
        margin-right: 4px; vertical-align: middle;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="header-logo">JS</div>
      <div style="flex:1;min-width:0;">
        <div class="header-title" id="header-title">Application Assistant</div>
        <div class="header-company" id="header-company"></div>
      </div>
      <div class="score-badge" id="score-badge" style="display:none"></div>
    </div>

    <div class="content" id="main-content">
      <div class="loading-msg" id="loading-msg">Loading…</div>
    </div>

    <script src="sidepanel.js"></script>
  </body>
</html>
