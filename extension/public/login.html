<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JobScout — Sign In</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1a1a2e; color: #eaeaea;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; font-size: 14px;
    }
    .card {
      background: #16213e; border: 1px solid #2a2a4a;
      border-radius: 12px; padding: 36px 32px;
      width: 100%; max-width: 400px;
    }
    .logo-row { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
    .logo { width: 40px; height: 40px; background: #e94560; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 14px; }
    h1 { font-size: 20px; }
    .subtitle { color: #8892a4; font-size: 13px; margin-bottom: 24px; }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 0.4px; color: #8892a4; margin-bottom: 5px; }
    .field input { width: 100%; background: #1a1a2e; border: 1px solid #2a2a4a; border-radius: 6px; padding: 9px 12px; color: #eaeaea; font-size: 14px; outline: none; }
    .field input:focus { border-color: #e94560; }
    .btn { width: 100%; background: #e94560; color: #fff; border: none; border-radius: 6px; padding: 11px; font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 6px; }
    .btn:hover { opacity: 0.88; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .error { background: rgba(233,69,96,0.12); border: 1px solid #e94560; border-radius: 6px; padding: 9px 12px; color: #e94560; font-size: 13px; margin-bottom: 14px; }
    .hidden { display: none !important; }
    .toggle { text-align: center; margin-top: 18px; font-size: 13px; color: #8892a4; }
    .toggle a { color: #4a9eff; cursor: pointer; }

    /* API key section (shown after login) */
    #api-key-section .api-title { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
    #api-key-section .api-desc { font-size: 12px; color: #8892a4; margin-bottom: 18px; line-height: 1.5; }
    .success-msg { background: rgba(76,175,138,0.12); border: 1px solid #4caf8a; border-radius: 6px; padding: 9px 12px; color: #4caf8a; font-size: 13px; margin-bottom: 14px; }
    .skip-link { text-align: center; margin-top: 14px; }
    .skip-link a { color: #8892a4; font-size: 12px; cursor: pointer; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo-row">
    <div class="logo">JS</div>
    <h1>JobScout</h1>
  </div>

  <!-- Login -->
  <div id="login-section">
    <p class="subtitle">Sign in to enable job analysis</p>
    <div id="login-error" class="error hidden"></div>
    <form id="login-form">
      <div class="field"><label>Email</label><input type="email" id="login-email" required autocomplete="email"></div>
      <div class="field"><label>Password</label><input type="password" id="login-password" required autocomplete="current-password"></div>
      <button type="submit" class="btn" id="btn-login">Sign In</button>
    </form>
    <div class="toggle">No account? <a id="show-register">Create one</a></div>
  </div>

  <!-- Register -->
  <div id="register-section" class="hidden">
    <p class="subtitle">Create your account</p>
    <div id="register-error" class="error hidden"></div>
    <form id="register-form">
      <div class="field"><label>Email</label><input type="email" id="reg-email" required autocomplete="email"></div>
      <div class="field"><label>Password</label><input type="password" id="reg-password" required minlength="8" autocomplete="new-password"></div>
      <button type="submit" class="btn" id="btn-register">Create Account</button>
    </form>
    <div class="toggle">Have an account? <a id="show-login">Sign in</a></div>
  </div>

  <!-- API Key (shown after login if not set) -->
  <div id="api-key-section" class="hidden">
    <div class="api-title">Add your Anthropic API key</div>
    <p class="api-desc">JobScout uses your own API key for job analysis. Get yours free at <strong>console.anthropic.com</strong>.</p>
    <div id="key-error" class="error hidden"></div>
    <div id="key-success" class="success-msg hidden">API key saved! You can close this tab.</div>
    <div class="field"><label>API Key</label><input type="password" id="key-input" placeholder="sk-ant-api03-…" autocomplete="off"></div>
    <button class="btn" id="btn-save-key">Save Key</button>
    <div class="skip-link"><a id="skip-key">Skip for now</a></div>
  </div>
</div>

<script src="login.js"></script>
</body>
</html>
