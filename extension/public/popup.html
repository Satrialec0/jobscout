<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JobScout</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        width: 380px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f172a;
        color: #e2e8f0;
      }

      .header {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 14px 16px;
        border-bottom: 1px solid #1e293b;
      }

      .header-logo {
        width: 20px;
        height: 20px;
        background: #38bdf8;
        border-radius: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 700;
        color: #0f172a;
      }

      .header-title {
        font-size: 14px;
        font-weight: 600;
        color: #f1f5f9;
      }

      .header-subtitle {
        font-size: 11px;
        color: #64748b;
        margin-left: auto;
      }

      .state-loading,
      .state-empty,
      .state-error {
        padding: 32px 16px;
        text-align: center;
        color: #64748b;
        font-size: 13px;
        line-height: 1.6;
      }

      .state-loading .spinner {
        width: 24px;
        height: 24px;
        border: 2px solid #1e293b;
        border-top-color: #38bdf8;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 12px;
      }

      .state-loading .loading-label {
        font-size: 13px;
        color: #94a3b8;
        margin-bottom: 4px;
      }

      .state-loading .loading-sub {
        font-size: 11px;
        color: #475569;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      .score-hero {
        padding: 20px 16px 16px;
        display: flex;
        align-items: center;
        gap: 16px;
        border-bottom: 1px solid #1e293b;
      }

      .score-ring-wrap {
        position: relative;
        width: 72px;
        height: 72px;
        flex-shrink: 0;
      }

      .score-ring-wrap svg {
        transform: rotate(-90deg);
      }

      .score-number {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        font-weight: 700;
        color: #f1f5f9;
      }

      .score-meta {
        flex: 1;
        min-width: 0;
      }

      .score-job-title {
        font-size: 13px;
        font-weight: 600;
        color: #f1f5f9;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .score-company {
        font-size: 12px;
        color: #64748b;
        margin-bottom: 8px;
      }

      .badge-row {
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: wrap;
      }

      .apply-badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 3px 8px;
        border-radius: 4px;
        font-size: 11px;
        font-weight: 600;
      }

      .apply-badge.yes {
        background: #052e16;
        color: #4ade80;
        border: 1px solid #166534;
      }

      .apply-badge.no {
        background: #2d1515;
        color: #f87171;
        border: 1px solid #7f1d1d;
      }

      .applied-badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 3px 8px;
        border-radius: 4px;
        font-size: 11px;
        font-weight: 600;
        background: #0c1a3a;
        color: #38bdf8;
        border: 1px solid #1e3a5f;
      }

      .salary-badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 3px 8px;
        border-radius: 4px;
        font-size: 11px;
        font-weight: 500;
        background: #1a1a2e;
        color: #a78bfa;
        border: 1px solid #3b1f6e;
      }

      .easy-apply-badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 3px 8px;
        border-radius: 4px;
        font-size: 11px;
        font-weight: 500;
        background: #0f2a1a;
        color: #6ee7b7;
        border: 1px solid #065f46;
      }

      .age-badge {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 3px 8px;
        border-radius: 4px;
        font-size: 11px;
        font-weight: 500;
        background: #1c1400;
        color: #fbbf24;
        border: 1px solid #78350f;
      }

      .age-badge.stale {
        background: #2d1515;
        color: #f87171;
        border: 1px solid #7f1d1d;
      }

      .verdict {
        padding: 12px 16px;
        font-size: 12px;
        color: #94a3b8;
        line-height: 1.5;
        border-bottom: 1px solid #1e293b;
        font-style: italic;
      }

      .action-bar {
        display: flex;
        gap: 8px;
        padding: 10px 16px;
        border-bottom: 1px solid #1e293b;
      }

      .btn {
        flex: 1;
        padding: 7px 12px;
        border-radius: 6px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        border: none;
        transition: opacity 0.15s;
      }

      .btn:hover {
        opacity: 0.85;
      }
      .btn:active {
        opacity: 0.7;
      }

      .btn-reanalyze {
        background: #1e293b;
        color: #94a3b8;
        border: 1px solid #334155;
      }

      .btn-applied {
        background: #0c1a3a;
        color: #38bdf8;
        border: 1px solid #1e3a5f;
      }

      .btn-applied.done {
        background: #052e16;
        color: #4ade80;
        border: 1px solid #166534;
        cursor: default;
      }

      .section {
        border-bottom: 1px solid #1e293b;
      }

      .section-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 16px;
        cursor: pointer;
        user-select: none;
      }

      .section-header:hover {
        background: #1e293b;
      }

      .section-title {
        font-size: 12px;
        font-weight: 600;
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .section-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
      }

      .section-count {
        font-size: 11px;
        color: #475569;
        font-weight: 400;
      }

      .section-chevron {
        font-size: 10px;
        color: #475569;
        transition: transform 0.15s;
      }

      .section-chevron.open {
        transform: rotate(180deg);
      }

      .section-body {
        display: none;
        padding: 0 16px 10px;
      }
      .section-body.open {
        display: block;
      }

      .section-item {
        padding: 6px 0;
        border-bottom: 1px solid #1e293b;
      }

      .section-item:last-child {
        border-bottom: none;
      }

      .item-label {
        font-size: 12px;
        font-weight: 500;
        color: #e2e8f0;
        margin-bottom: 2px;
      }

      .item-detail {
        font-size: 11px;
        color: #64748b;
        line-height: 1.4;
      }

      .flag-item {
        font-size: 12px;
        color: #94a3b8;
        padding: 4px 0;
        line-height: 1.4;
        display: flex;
        gap: 6px;
      }

      .flag-dot {
        flex-shrink: 0;
        margin-top: 5px;
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: currentColor;
      }

      .footer {
        padding: 10px 16px;
        font-size: 11px;
        color: #334155;
        text-align: center;
      }

      .bulk-bar {
        padding: 8px 16px;
        border-bottom: 1px solid #1e293b;
      }
      .btn-bulk {
        width: 100%;
        background: #1e1b4b;
        color: #a78bfa;
        border: 1px solid #4c1d95;
        font-size: 11px;
        padding: 6px 12px;
        border-radius: 6px;
        cursor: pointer;
        transition: background 0.15s;
      }
      .btn-bulk:hover {
        background: #2e1065;
      }
      .btn-bulk:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .bulk-progress {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-top: 6px;
        font-size: 11px;
        color: #94a3b8;
      }
      .btn-cancel-bulk {
        background: transparent;
        border: 1px solid #475569;
        color: #94a3b8;
        font-size: 10px;
        padding: 2px 6px;
        border-radius: 4px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="header-logo">JS</div>
      <span class="header-title">JobScout</span>
      <span class="header-subtitle" id="timestamp"></span>
    </div>
    <div id="content">
      <div class="state-loading">
        <div class="spinner"></div>
        <div class="loading-label">Analyzing job...</div>
        <div class="loading-sub">This takes about 10 seconds</div>
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
