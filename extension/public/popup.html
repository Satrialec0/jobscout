<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JobScout</title>
    <style>
      body {
        width: 360px;
        min-height: 200px;
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f172a;
        color: #f1f5f9;
        padding: 16px;
        box-sizing: border-box;
      }
      #app {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .header {
        font-size: 16px;
        font-weight: 600;
        color: #38bdf8;
      }
      .status {
        font-size: 13px;
        color: #94a3b8;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div class="header">JobScout</div>
      <div class="status" id="status">
        Navigate to a job listing to see your fit score.
      </div>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
